version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: gold-fte-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19
    container_name: gold-fte-odoo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
    ports:
      - "8069:8069"
    restart: unless-stopped

volumes:
  odoo-db-data:
    name: gold-fte-odoo-db
  odoo-web-data:
    name: gold-fte-odoo-web
